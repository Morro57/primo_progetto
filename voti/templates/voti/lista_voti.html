{% extends "base.html" %}

{%block title%}Voti e Assenze {%endblock title%}

{%block content%}
<ol>
{% for  nome,pagella in voti.items %}
    <li>{{nome}}</li>
        {% for materia,voto,assenze in pagella%}
            <ul>
                <li>{{materia}}, {{voto}}, {{assenze}}</li>
            </ul>
        {% endfor %}
    {% endfor %}
</ol>
{%endblock content%}
