<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista TODO</title>
</head>
<body>
    <h1>Lista delle attività (TODO)</h1>

    {% if errore %}
        <p style="color: red;">{{errore}}</p>
    {% endif %}

    {% if  todos%}
        <ul>
            {% for elemento in todos %}
            <li>
                <strong>ID:</strong> {{elemento.id}}<br>
                <strong>Titolo:</strong>{{elemento.title}} <br>
                <strong>Completato:</strong>{{elemento.completed}} <br><br>
            </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>Nessun dato disponibile.</p>
    {% endif %}
    
</body>
</html>
